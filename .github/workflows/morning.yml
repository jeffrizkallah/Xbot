name: Morning drafts

on:
  schedule:
    # 13:00 UTC = 09:00 ET. Adjust to your timezone.
    - cron: "0 13 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: twitter-agent-state
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run morning pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          ENABLE_X_SEARCH: ${{ vars.ENABLE_X_SEARCH || 'false' }}
        run: python morning_job.py

      - name: Commit updated state
        run: |
          set -e
          git config user.name  "twitter-agent-bot"
          git config user.email "twitter-agent-bot@users.noreply.github.com"
          git add state/
          if git diff --cached --quiet; then
            echo "No state changes to commit"
            exit 0
          fi
          git commit -m "state: morning run $(date -u +%FT%TZ)"
          for i in 1 2 3 4 5; do
            if git push; then exit 0; fi
            echo "Push rejected — rebasing and retrying ($i/5)..."
            git pull --rebase origin main || { git rebase --abort || true; sleep 2; }
          done
          echo "Push still failing after retries" && exit 1
