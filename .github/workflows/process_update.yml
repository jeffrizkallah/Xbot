name: Process Telegram update

# Triggered by the Cloudflare Worker for each Telegram update (button taps,
# edits, status command). Processes the update, posts approved drafts if
# eligible, and commits state.

on:
  workflow_dispatch:
    inputs:
      update_json:
        description: JSON-encoded Telegram update
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: twitter-agent-state
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Process update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          GH_REPO: ${{ github.repository }}
          GH_WORKFLOW_TOKEN: ${{ secrets.GH_WORKFLOW_TOKEN }}
          UPDATE_JSON: ${{ inputs.update_json }}
        run: python process_update.py

      - name: Commit updated state
        run: |
          git config user.name  "twitter-agent-bot"
          git config user.email "twitter-agent-bot@users.noreply.github.com"
          git add state/
          if git diff --cached --quiet; then
            echo "No state changes to commit"
          else
            git commit -m "state: webhook update $(date -u +%FT%TZ)"
            git push
          fi
